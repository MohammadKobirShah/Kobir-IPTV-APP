name: Build Kobir IPTV APK

on:
  push:
    branches: [main, master]
    tags: ["v*"]
  pull_request:
    branches: [main, master]
  workflow_dispatch:

jobs:
  build:
    name: Build APK
    runs-on: ubuntu-latest

    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17
          cache: gradle

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Decode keystore
        if: ${{ secrets.KEYSTORE_BASE64 != '' }}
        env:
          KEYSTORE_BASE64: ${{ secrets.KEYSTORE_BASE64 }}
        run: |
          echo "$KEYSTORE_BASE64" | base64 -d > keystore.jks
          echo "KEYSTORE_PATH=${{ github.workspace }}/keystore.jks" >> $GITHUB_ENV

      - name: Build debug APK
        run: ./gradlew assembleDebug

      - name: Build release APK
        if: startsWith(github.ref, 'refs/tags/v')
        env:
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
          VERSION_CODE: ${{ github.run_number }}
          VERSION_NAME: ${{ github.ref_name }}
        run: ./gradlew assembleRelease

      - name: Rename APKs
        run: |
          VERSION="${GITHUB_REF_NAME:-dev}"
          SHA="${GITHUB_SHA::7}"
          mkdir -p artifacts

          for apk in app/build/outputs/apk/debug/*.apk; do
            [ -f "$apk" ] && cp "$apk" "artifacts/KobirIPTV-${VERSION}-${SHA}-debug.apk"
          done

          for apk in app/build/outputs/apk/release/*.apk; do
            [ -f "$apk" ] && cp "$apk" "artifacts/KobirIPTV-${VERSION}-${SHA}-release.apk"
          done

      - name: Upload APK artifacts
        uses: actions/upload-artifact@v4
        with:
          name: KobirIPTV-APK
          path: artifacts/
          compression-level: 0
          retention-days: 30

  release:
    name: Create GitHub Release
    if: startsWith(github.ref, 'refs/tags/v')
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Download APK artifacts
        uses: actions/download-artifact@v4
        with:
          name: KobirIPTV-APK

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          name: Kobir IPTV ${{ github.ref_name }}
          body: |
            ## Kobir IPTV ${{ github.ref_name }}

            Full Free Apps, No Premium Subscription

            ### Assets
            - Debug APK (unsigned, for testing)
            - Release APK (signed, for production)
          draft: false
          prerelease: ${{ contains(github.ref_name, '-beta') || contains(github.ref_name, '-rc') }}
          files: |
            *.apk

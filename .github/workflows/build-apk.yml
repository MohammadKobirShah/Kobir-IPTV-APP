name: Build Kobir IPTV APK

on:
  push:
    branches: [main, master]
    tags: ["v*"]
  pull_request:
    branches: [main, master]
  workflow_dispatch:

jobs:
  build:
    name: Build APK
    runs-on: ubuntu-latest

    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17
          cache: gradle

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Build debug APK
        run: ./gradlew assembleDebug --build-cache --no-daemon

      - name: Rename APK
        run: |
          VERSION="${GITHUB_REF_NAME:-dev}"
          SHA="${GITHUB_SHA::7}"
          mkdir -p artifacts

          shopt -s nullglob
          apks=(app/build/outputs/apk/debug/*.apk)

          if [ ${#apks[@]} -eq 0 ]; then
            echo "::error::No debug APK found after build"
            exit 1
          fi

          cp "${apks[0]}" "artifacts/KobirIPTV-${VERSION}-${SHA}.apk"
          echo "APK_NAME=KobirIPTV-${VERSION}-${SHA}.apk" >> $GITHUB_ENV
          echo "Renamed to: KobirIPTV-${VERSION}-${SHA}.apk"

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: KobirIPTV-APK
          path: artifacts/*.apk
          if-no-files-found: error
          compression-level: 0
          retention-days: 30

  release:
    name: Create GitHub Release
    if: startsWith(github.ref, 'refs/tags/v')
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Download APK artifact
        uses: actions/download-artifact@v4
        with:
          name: KobirIPTV-APK
          path: release-assets

      - name: List release assets
        run: ls -lh release-assets/

      - name: Create GitHub release
        uses: softprops/action-gh-release@v2
        with:
          name: Kobir IPTV ${{ github.ref_name }}
          body: |
            ## Kobir IPTV ${{ github.ref_name }}

            ### Download
            Download the APK below and install it on your Android device.

            > **Note:** You may need to enable **Install from unknown sources** in your device settings.

            ### Changelog
            - See commits for full list of changes
          draft: false
          prerelease: ${{ contains(github.ref_name, '-beta') || contains(github.ref_name, '-rc') }}
          files: release-assets/*.apk
